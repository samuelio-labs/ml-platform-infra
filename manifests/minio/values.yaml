# Bitnami MinIO — https://artifacthub.io/packages/helm/bitnami/minio
# Credentials are pre-provisioned by Terraform in the minio-credentials Secret.

auth:
  existingSecret: minio-credentials
  rootUserSecretKey: root-user
  rootPasswordSecretKey: root-password

# Buckets created on first startup
defaultBuckets: "mlflow-artifacts,dvc-store,pipeline-cache"

persistence:
  enabled: true
  size: 10Gi
  storageClass: gp2

service:
  type: ClusterIP

# Console UI disabled — image not available on this chart version
console:
  enabled: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
