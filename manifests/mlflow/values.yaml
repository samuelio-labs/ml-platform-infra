# community-charts MLflow v1.8.1 — https://artifacthub.io/packages/helm/community-charts/mlflow
# Secrets are pre-provisioned by Terraform.

backendStore:
  databaseMigration: true
  databaseConnectionCheck: true
  postgres:
    enabled: true
    host: postgresql.mlflow.svc.cluster.local
    port: 5432
    database: mlflow
    user: mlflow
    password: ""
  # Reference the Terraform-provisioned postgres-credentials Secret for the password.
  existingDatabaseSecret:
    name: postgres-credentials
    passwordKey: password

artifactRoot:
  s3:
    enabled: true
    bucket: mlflow-artifacts
    # Reference the Terraform-provisioned minio-credentials Secret.
    existingSecret:
      name: minio-credentials
      keyOfAccessKeyId: root-user
      keyOfSecretAccessKey: root-password

# extraEnvVars is an object map (key: value), not an array.
extraEnvVars:
  MLFLOW_S3_ENDPOINT_URL: "http://minio.mlflow.svc.cluster.local:9000"

# Load the mlflow-secret-key Secret as envFrom so FLASK_SECRET_KEY is available.
extraSecretNamesForEnvFrom:
  - mlflow-secret-key

serviceAccount:
  create: true

service:
  type: ClusterIP
  port: 5000

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

replicaCount: 1
