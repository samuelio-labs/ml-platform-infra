apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Helm chart — community-charts MLflow
    - repoURL: https://community-charts.github.io/helm-charts
      chart: mlflow
      # Pin to a specific version in production. Check latest:
      #   helm search repo community-charts/mlflow --versions | head -5
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/manifests/mlflow/values.yaml
    # Values source — our infra repo
    - repoURL: https://github.com/samuelio-labs/ml-platform-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: mlflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
