# Official MinIO Helm chart — https://charts.min.io/
# Credentials are pre-provisioned by Terraform in the minio-credentials Secret.

mode: standalone

# Inject root credentials from existing secret (keeps Bitnami-style key names)
extraEnvVars:
  - name: MINIO_ROOT_USER
    valueFrom:
      secretKeyRef:
        name: minio-credentials
        key: root-user
  - name: MINIO_ROOT_PASSWORD
    valueFrom:
      secretKeyRef:
        name: minio-credentials
        key: root-password

# Buckets created on first startup
buckets:
  - name: mlflow-artifacts
    policy: none
    purge: false
  - name: dvc-store
    policy: none
    purge: false
  - name: pipeline-cache
    policy: none
    purge: false

persistence:
  enabled: true
  size: 10Gi

service:
  type: ClusterIP
  port: 9000

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
